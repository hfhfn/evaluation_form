<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 — 答辩评分系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
body{background:#f0f4fa;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

.login-card{background:white;border-radius:16px;padding:40px 36px;width:380px;max-width:95vw;
  box-shadow:0 8px 30px rgba(0,0,0,0.10);}
.login-card h2{color:#1a73e8;text-align:center;margin-bottom:6px;font-size:1.5rem;}
.login-card .sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:28px;}

.form-group{margin-bottom:18px;}
.form-group label{display:block;font-weight:600;color:#444;margin-bottom:6px;font-size:.9rem;}
.form-group input{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:9px;
  font-size:.98rem;transition:border-color .2s;}
.form-group input:focus{outline:none;border-color:#1a73e8;}

.err{color:#ea4335;font-size:.83rem;text-align:center;margin-bottom:14px;min-height:20px;}

.btn-login{width:100%;padding:12px;border:none;border-radius:9px;font-size:1rem;font-weight:700;
  background:linear-gradient(135deg,#1a73e8,#6c5ce7);color:white;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.92;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}

.hint{text-align:center;font-size:.78rem;color:#bbb;margin-top:20px;}
</style>
</head>
<body>

<div class="login-card">
  <h2>🔐 管理员登录</h2>
  <p class="sub">实战答辩评分系统</p>
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>
  <div class="err" id="errMsg"></div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">登 录</button>
  <p class="hint">默认账户 admin / admin123</p>
</div>

<script>
// 检查是否已登录
async function checkLogin() {
  try {
    const res = await fetch('/api/admin/check');
    const data = await res.json();
    if (data.logged_in) {
      window.location.href = '/admin';
    }
  } catch(e) {}
}
checkLogin();

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('loginBtn');

  if (!username) { err.textContent = '请输入用户名'; return; }
  if (!password) { err.textContent = '请输入密码'; return; }

  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '登录中...';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/admin';
    } else {
      err.textContent = data.error || '登录失败';
    }
  } catch(e) {
    err.textContent = '网络错误，请重试';
  }

  btn.disabled = false;
  btn.textContent = '登 录';
}

// 回车登录
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
